        <main>
            <h1>Mande uma mensagem</h1>
            <br>

            <form action="">
                <ul>
                    <li><label>Nome: </label>
                    <input type="text" required></li>

                    <li><label>E-mail: </label>
                    <input type="email" required></li>

                    <li><label>Telefone: </label>
                    <input type="tel" placeholder="(99) 99999-9999" required></li>

                    <li><label for="">Assunto: </label>
                        <select name="" id="">
                            <option value="">-- Selecione --</option><br>
                            <option value="">Reclamação</option><br>
                            <option value="">Sugestão</option><br>
                        </select>

                    <br>

                    <li><label for="">Mensagem: </label></li>
                    <textarea name="" id=""></textarea>

                    <li>
                        <fieldset>
                            <legend>Opções de Resposta</legend>
                            <input type="checkbox" id="email" name="email">
                            <label for="telefone">Telefone</label>
                            <input type="checkbox" id="telefone" name="telefone">
                            <label for="email">E-mail</label><br>
                        </fieldset>
                    </li>

                    <li>
                        <button type="submit">Enviar</button>
                    </li>
                </ul>
            </form>
        </main>
